# Free deployment on Render (a long-running Node web service handles streaming
# + multi-page OCR without serverless timeouts). Create a Blueprint from this
# file, then set GOOGLE_API_KEY in the dashboard.
services:
  - type: web
    name: work-permit-intelligence-agent
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OCR_LANGS
        value: eng+deu
      - key: NODE_VERSION
        value: "20.18.0"
