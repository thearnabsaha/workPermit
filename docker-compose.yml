# The app is stateless (no DB/Redis), so the full stack is a single service.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OCR_LANGS=${OCR_LANGS:-eng+deu}
    restart: unless-stopped
